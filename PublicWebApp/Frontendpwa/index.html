<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lako">
    <link rel="manifest" href="/manifest.json">
    <title>Lako · Street Food Discovery & Navigation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <style>
        :root{--primary:#FF6B35;--primary-gradient:linear-gradient(135deg,#FF6B35,#FF8A5C);--primary-soft:rgba(255,107,53,.12);--bg-dark:#0a0a0f;--bg-surface:#14141a;--bg-card:#1c1c24;--bg-elevated:#24242e;--text-primary:#fff;--text-secondary:#9ca3af;--border-light:rgba(255,255,255,.08);--success:#10b981;--danger:#ef4444}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-dark);overflow:hidden;height:100vh;color:var(--text-primary)}
        #app{width:100%;height:100%;position:relative}
        .app-container{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg-dark);overflow:hidden}
        .tab-pane{flex:1;overflow-y:auto;padding:20px 16px 90px 16px;scroll-behavior:smooth}
        .tab-pane.hidden{display:none}
        .map-screen{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
        .map-search-bar{position:absolute;top:16px;left:16px;right:16px;z-index:500;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);border-radius:60px;padding:12px 20px;display:flex;gap:12px;align-items:center;border:1px solid var(--border-light)}
        .map-search-bar input{flex:1;background:transparent;border:none;color:#fff;font-size:1rem;outline:none}
        .map-search-bar button{background:var(--primary-gradient);border:none;padding:8px 20px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer}
        .map-container{flex:1;width:100%;position:relative}
        #map{width:100%;height:100%;background:#1a2a3a}
        .map-controls{position:absolute;bottom:20px;right:20px;display:flex;flex-direction:column;gap:12px;z-index:400}
        .map-btn{background:rgba(0,0,0,.8);backdrop-filter:blur(10px);border:1px solid var(--border-light);width:48px;height:48px;border-radius:48px;font-size:1.2rem;color:var(--primary);cursor:pointer}
        .location-status{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);padding:8px 16px;border-radius:40px;font-size:.7rem;z-index:400;color:#fff}
        .bottom-nav{background:rgba(20,20,26,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border-light);display:flex;justify-content:space-around;padding:8px 16px 12px;flex-shrink:0}
        .nav-item{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.7rem;color:var(--text-secondary);cursor:pointer;padding:8px 16px;border-radius:40px;transition:all .2s}
        .nav-item i{font-size:1.3rem}
        .nav-item.active{color:var(--primary);background:var(--primary-soft)}
        .post-card,.vendor-card{background:var(--bg-card);border-radius:20px;padding:1rem;margin-bottom:1rem;border:1px solid var(--border-light);cursor:pointer;transition:all .2s}
        .post-card:hover,.vendor-card:hover{transform:translateY(-2px);border-color:var(--primary)}
        .post-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .post-avatar{width:44px;height:44px;border-radius:44px;background:var(--primary-gradient);display:flex;align-items:center;justify-content:center;font-weight:600}
        .btn-primary{background:var(--primary-gradient);border:none;padding:14px 24px;border-radius:60px;color:#fff;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
        .btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary);border-radius:60px;padding:12px 20px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
        .input-group{margin-bottom:1rem;position:relative}
        .input-group i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-secondary);z-index:1}
        .input-group input,.input-group textarea,.input-group select{width:100%;padding:14px 14px 14px 48px;border:1px solid var(--border-light);border-radius:60px;background:var(--bg-elevated);color:#fff;font-size:.95rem;outline:none}
        .vendor-icon{width:56px;height:56px;background:var(--primary-gradient);border-radius:28px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;flex-shrink:0}
        .badge-distance{background:var(--primary-soft);border-radius:20px;padding:4px 12px;font-size:.65rem;color:var(--primary);margin-left:8px}
        .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);padding:6px 14px;border-radius:40px;font-size:.7rem;font-weight:500;color:var(--primary);cursor:pointer}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal-card{background:var(--bg-surface);border-radius:28px;max-width:550px;width:100%;max-height:85vh;overflow:auto;border:1px solid var(--border-light)}
        .modal-header{background:var(--primary-gradient);padding:18px 24px;color:#fff;border-radius:28px 28px 0 0;position:relative}
        .modal-close{position:absolute;right:20px;top:18px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:32px;cursor:pointer}
        .toast{position:fixed;bottom:100px;left:20px;right:20px;background:var(--primary-gradient);color:#fff;padding:14px 20px;border-radius:28px;z-index:1000;display:flex;justify-content:space-between;align-items:center;animation:slideUp .3s ease}
        @keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
        .flex-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .flex-col{display:flex;flex-direction:column;gap:8px}
        .settings-section{margin-bottom:24px}
        .settings-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border-light);cursor:pointer}
        .settings-item:last-child{border-bottom:none}
        .settings-label{font-weight:500}
        .settings-description{font-size:.7rem;color:var(--text-secondary);margin-top:2px}
        .eula-content{height:400px;overflow-y:auto;padding:20px;background:var(--bg-elevated);border-radius:16px;margin-bottom:16px;font-size:.85rem;line-height:1.6;white-space:pre-wrap}
        .eula-notice{margin:15px 0;padding:16px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:16px;font-size:0.95rem}
        .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
        .stat-card{background:var(--bg-elevated);border-radius:16px;padding:12px;text-align:center}
        .stat-value{font-size:1.5rem;font-weight:700;color:var(--primary)}
        .stat-label{font-size:.7rem;color:var(--text-secondary)}
        .developer-card{background:var(--bg-elevated);border-radius:12px;padding:12px;margin-bottom:8px}
        .developer-name{font-weight:600}
        .developer-role{font-size:.75rem;color:var(--text-secondary)}
        .about-section{margin-bottom:24px}
        .about-section h4{color:var(--primary);margin-bottom:12px}
        .loader{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .rating-star{color:#fbbf24}
        .hidden{display:none!important}
        .toggle-switch{position:relative;display:inline-block;width:48px;height:24px}
        .toggle-switch input{opacity:0;width:0;height:0}
        .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#3f3f46;border-radius:34px;transition:.2s}
        .toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:2px;bottom:2px;background-color:#fff;border-radius:50%;transition:.2s}
        input:checked + .toggle-slider{background-color:var(--primary)}
        input:checked + .toggle-slider:before{transform:translateX(24px)}
        @media(max-width:768px){.tab-pane{padding:16px 12px 90px 12px}}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
        ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px}
    </style>
</head>
<body data-theme="orange">
<div id="app"></div>

<script>
// ==================== API CONFIGURATION ====================
const API_BASE = 'http://localhost:5000/api';
let projectInfo = null;
let eulaData = null;

// ==================== APP STATE ====================
let state = {
    user: null,
    vendors: [],
    posts: [],
    shortlist: [],
    activities: [],
    votes: {},
    location: null,
    filters: { category: null, minRating: 0, radius: 5, timeRange: 'week' },
    settings: {
        theme: localStorage.getItem('theme') || 'orange',
        notifications: { push: true, geofence: true, email: true },
        privacy: { shareLocation: true, shareActivity: true },
        preferences: { categories: [], radius: 5, interests: [] }
    }
};

let watchId = null;
let geofenceAlerts = new Set();
let offlineQueue = [];

// ==================== HELPER FUNCTIONS ====================
function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function formatRelativeTime(date) {
    const now = new Date();
    const diff = now - new Date(date);
    const minutes = Math.floor(diff / 60000);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    if (minutes < 1) return 'just now';
    if (minutes < 60) return minutes + 'm ago';
    if (hours < 24) return hours + 'h ago';
    if (days < 7) return days + 'd ago';
    return new Date(date).toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>${msg}</span><button onclick="this.parentElement.remove()" style="background:white;border:none;padding:6px 14px;border-radius:40px;cursor:pointer">OK</button>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
}

// ==================== API SERVICE ====================
const API = {
    async request(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (state.user && state.user.id) headers['X-User-Id'] = state.user.id;
        const res = await fetch(API_BASE + endpoint, { ...options, headers });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    },
    async getProjectInfo() {
        try { const data = await this.request('/project/info'); projectInfo = data; return data; } 
        catch(e) { return null; }
    },
    async getEULA() {
        try { 
            const data = await this.request('/legal/eula'); 
            eulaData = data; 
            return data; 
        } catch(e) { 
            return { content: "End User License Agreement\n\nThis is a Capstone Project at AITE.\n\nBy using this application, you agree to the terms.", version: "1.0.0" }; 
        }
    },
    async acceptEULA(version) {
        return this.request('/legal/accept-eula', { method: 'POST', body: JSON.stringify({ version }) });
    },
    async checkEULAAccepted() {
        try {
            return this.request('/legal/check-eula');
        } catch(e) {
            return { accepted: false };
        }
    },
    async login(email, password) {
        const data = await this.request('/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        if (data.success) {
            state.user = { id: data.id, full_name: data.full_name, email: data.email, phone: data.phone };
            localStorage.setItem('lako_user', JSON.stringify(state.user));
            await this.loadUserData();
        }
        return data;
    },
    async register(data) {
        return this.request('/register', { method: 'POST', body: JSON.stringify(data) });
    },
    async loadUserData() {
        if (!state.user) return;
        const [vendors, posts, shortlist, activities, votes] = await Promise.all([
            this.request('/vendors').catch(() => []),
            this.request('/posts?sort=new&limit=50').catch(() => []),
            this.request(`/shortlist/user/${state.user.id}`).catch(() => []),
            this.request(`/activities/user/${state.user.id}`).catch(() => []),
            this.request(`/votes/user/${state.user.id}`).catch(() => [])
        ]);
        state.vendors = vendors;
        state.posts = posts;
        state.shortlist = shortlist;
        state.activities = activities;
        state.votes = votes.reduce((acc, v) => { acc[v.post_id] = v.vote_type; return acc; }, {});
        this.renderAll();
    },
    async addToShortlist(vendorId) {
        if (navigator.onLine) {
            await this.request('/shortlist', { method: 'POST', body: JSON.stringify({ vendor_id: vendorId }) });
        } else {
            offlineQueue.push({action: 'addShortlist', vendorId});
            showToast('Action queued for sync');
        }
        await this.loadUserData();
        showToast('Added to shortlist');
    },
    async removeFromShortlist(vendorId) {
        if (navigator.onLine) {
            await this.request(`/shortlist/${vendorId}/user/${state.user.id}`, { method: 'DELETE' });
        } else {
            offlineQueue.push({action: 'removeShortlist', vendorId});
            showToast('Action queued for sync');
        }
        await this.loadUserData();
        showToast('Removed from shortlist');
    },
    async createPost(data) {
        if (navigator.onLine) {
            await this.request('/posts', { method: 'POST', body: JSON.stringify(data) });
        } else {
            offlineQueue.push({action: 'createPost', data});
            showToast('Post queued for sync');
        }
        await this.loadUserData();
        showToast('Post created successfully');
    },
    async vote(postId, type) {
        if (navigator.onLine) {
            await this.request('/votes', { method: 'POST', body: JSON.stringify({ post_id: postId, vote_type: type }) });
        } else {
            offlineQueue.push({action: 'vote', postId, type});
            showToast('Vote queued for sync');
        }
        await this.loadUserData();
    },
    async createActivity(activity) {
        if (navigator.onLine) {
            await this.request('/activities', { method: 'POST', body: JSON.stringify(activity) });
        } else {
            offlineQueue.push({action: 'createActivity', activity});
        }
    },
    async getMessengerLink(vendorId) { return this.request(`/vendors/${vendorId}/messenger`); },
    async getRecommendations() { return this.request(`/recommendations/user/${state.user.id}`).catch(() => []); },
    async requestSample(vendorId, productId, location, dateTime) {
        await this.request('/sample-requests', { method: 'POST', body: JSON.stringify({ vendor_id: vendorId, product_id: productId, location, preferred_date: dateTime }) });
        showToast('Sample request submitted');
    },
    renderAll() { this.renderFeed(); this.renderShortlist(); this.renderActivities(); this.renderProfile(); },
    renderFeed() {
        const container = document.getElementById('feedList');
        if (!container) return;
        let filtered = [...state.posts];
        if (!filtered.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>No posts yet. Be the first to share!</p></div>'; return; }
        container.innerHTML = filtered.map(post => {
            const isLiked = state.votes[post.id] === 1;
            const vendor = state.vendors.find(v => v.id === post.vendor_id);
            const initials = (post.author_name || 'U').charAt(0).toUpperCase();
            return `<div class="post-card" onclick="window.showPostDetail(${post.id})">
                <div class="post-header">
                    <div class="post-avatar">${initials}</div>
                    <div class="flex-col" style="gap:2px">
                        <div style="font-weight:600">${escapeHtml(post.author_name || 'Anonymous')}</div>
                        <div style="font-size:.7rem;color:var(--text-secondary)">${formatRelativeTime(post.created_at)}${post.rating ? ` · ${'★'.repeat(post.rating)}${'☆'.repeat(5-post.rating)}` : ''}</div>
                    </div>
                </div>
                <div style="font-weight:600;margin-bottom:6px">${escapeHtml(post.title)}</div>
                <div style="color:var(--text-secondary);font-size:.85rem">${escapeHtml(post.content.length > 150 ? post.content.substring(0,150)+'...' : post.content)}</div>
                ${vendor ? `<div class="chip" style="margin-top:8px" onclick="event.stopPropagation();window.showVendorDetail(${vendor.id})"><i class="fas fa-store"></i> ${escapeHtml(vendor.business_name)}</div>` : ''}
                <div class="flex-row" style="gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)">
                    <button onclick="event.stopPropagation();window.votePost(${post.id},1)" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px"><i class="fas fa-arrow-up" style="${isLiked ? 'color:var(--primary)' : ''}"></i> ${post.upvotes||0}</button>
                    <button onclick="event.stopPropagation();" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px"><i class="fas fa-comment"></i> ${post.comment_count||0}</button>
                    <button onclick="event.stopPropagation();window.sharePost()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer"><i class="fas fa-share"></i></button>
                </div>
            </div>`;
        }).join('');
    },
    renderShortlist() {
        const container = document.getElementById('shortlistList');
        if (!container) return;
        if (!state.shortlist.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><p>Your saved vendors will appear here</p></div>'; return; }
        container.innerHTML = state.shortlist.map(v => `
            <div class="vendor-card" onclick="window.showVendorDetail(${v.id})">
                <div class="flex-row">
                    <div class="vendor-icon"><i class="fas fa-store"></i></div>
                    <div style="flex:1">
                        <div><strong>${escapeHtml(v.business_name)}</strong> <span class="badge-distance">${v.rating ? '★'+v.rating : 'New'}</span></div>
                        <div style="font-size:.75rem;color:var(--text-secondary)">${escapeHtml(v.address || 'Location pending')}</div>
                        <div class="flex-row" style="margin-top:8px;gap:8px">
                            <span class="chip" onclick="event.stopPropagation();window.navigateToVendor(${v.id})"><i class="fas fa-route"></i> Navigate</span>
                            <span class="chip" onclick="event.stopPropagation();window.chatWithVendor(${v.id})"><i class="fab fa-facebook-messenger"></i> Chat</span>
                            <span class="chip" onclick="event.stopPropagation();window.requestSampleFromVendor(${v.id})"><i class="fas fa-box"></i> Sample</span>
                            <span class="chip" onclick="event.stopPropagation();window.removeFromShortlist(${v.id})"><i class="fas fa-trash"></i> Remove</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    },
    renderActivities() {
        const container = document.getElementById('activitiesList');
        if (!container) return;
        if (!state.activities.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><p>Your activity history will appear here</p></div>'; return; }
        container.innerHTML = state.activities.map(a => `
            <div class="vendor-card" onclick="${a.vendor_id ? `window.showVendorDetail(${a.vendor_id})` : ''}">
                <div class="flex-row">
                    <div style="width:44px;height:44px;background:var(--primary-soft);border-radius:44px;display:flex;align-items:center;justify-content:center">
                        <i class="fas ${a.activity_type === 'view' ? 'fa-eye' : a.activity_type === 'navigate' ? 'fa-route' : a.activity_type === 'chat' ? 'fa-comment' : a.activity_type === 'sample_request' ? 'fa-box' : 'fa-clock'}" style="color:var(--primary)"></i>
                    </div>
                    <div style="flex:1">
                        <div><strong>${a.activity_type === 'view' ? 'Viewed' : a.activity_type === 'navigate' ? 'Navigated to' : a.activity_type === 'chat' ? 'Chatted with' : a.activity_type === 'sample_request' ? 'Requested sample from' : a.activity_type} ${a.vendor_name || 'a vendor'}</strong></div>
                        <div style="font-size:.7rem;color:var(--text-secondary)">${formatRelativeTime(a.created_at)}</div>
                    </div>
                </div>
            </div>
        `).join('');
    },
    renderProfile() {
        const container = document.getElementById('profileContent');
        if (!container || !state.user) return;
        const reviewCount = state.posts.filter(p => p.user_id === state.user.id).length;
        const likeCount = Object.values(state.votes).filter(v => v === 1).length;
        container.innerHTML = `
            <div style="background:var(--bg-elevated);border-radius:24px;padding:24px;text-align:center;margin-bottom:20px">
                <div style="width:80px;height:80px;background:var(--primary-gradient);border-radius:80px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem">${(state.user.full_name || 'U').charAt(0).toUpperCase()}</div>
                <h3>${escapeHtml(state.user.full_name)}</h3>
                <p style="color:var(--text-secondary);font-size:.85rem">${escapeHtml(state.user.email)}</p>
                <div class="stat-grid" style="margin-top:16px">
                    <div class="stat-card"><div class="stat-value">${reviewCount}</div><div class="stat-label">Reviews</div></div>
                    <div class="stat-card"><div class="stat-value">${likeCount}</div><div class="stat-label">Likes</div></div>
                    <div class="stat-card"><div class="stat-value">${state.shortlist.length}</div><div class="stat-label">Saved</div></div>
                    <div class="stat-card"><div class="stat-value">${state.activities.length}</div><div class="stat-label">Activities</div></div>
                </div>
            </div>
            <div class="settings-section"><h4 style="margin-bottom:16px">Account</h4>
                <div class="settings-item" onclick="window.editProfile()"><div><div class="settings-label">Edit Profile</div><div class="settings-description">Update your name, email, phone</div></div><i class="fas fa-chevron-right"></i></div>
                <div class="settings-item" onclick="window.changePassword()"><div><div class="settings-label">Change Password</div><div class="settings-description">Update your password</div></div><i class="fas fa-chevron-right"></i></div>
            </div>

// ==================== MAP SERVICE ====================
let mapInstance = null, routingControl = null, userMarker = null, vendorMarkers = [];

const MapService = {
    init(center) {
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map('map').setView([center.lat, center.lng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB', subdomains: 'abcd', maxZoom: 19 }).addTo(mapInstance);
    },
    addUserMarker(lat, lng) {
        if (userMarker) mapInstance.removeLayer(userMarker);
        userMarker = L.marker([lat, lng], { icon: L.divIcon({ html: '<div style="background:var(--primary);width:48px;height:48px;border-radius:48px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.3);border:2px solid white"><i class="fas fa-user" style="color:white;font-size:22px"></i></div>', iconSize: [48,48] }) }).addTo(mapInstance).bindPopup('Your location');
    },
    addVendorMarkers(vendors) {
        vendorMarkers.forEach(m => mapInstance.removeLayer(m));
        vendorMarkers = [];
        vendors.forEach(v => {
            if (!v.latitude || !v.longitude) return;
            const marker = L.marker([v.latitude, v.longitude], { icon: L.divIcon({ html: `<div style="background:var(--primary);width:40px;height:40px;border-radius:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid white;cursor:pointer"><i class="fas fa-utensils" style="color:white;font-size:18px"></i><span style="position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:2px 8px;border-radius:20px;font-size:10px;white-space:nowrap">${v.business_name.substring(0,15)}</span></div>`, iconSize: [40,40] }) }).addTo(mapInstance);
            marker.bindPopup(`<b>${escapeHtml(v.business_name)}</b><br>⭐ ${v.rating||0}/5<br>${escapeHtml(v.address||'')}<br><button onclick="window.showVendorDetail(${v.id})" style="margin-top:6px;background:var(--primary);color:white;border:none;padding:6px 12px;border-radius:20px">View Details</button>`);
            vendorMarkers.push(marker);
        });
    },
    navigateTo(lat, lng) {
        if (routingControl) mapInstance.removeControl(routingControl);
        if (!state.location) return;
        routingControl = L.Routing.control({
            waypoints: [L.latLng(state.location.lat, state.location.lng), L.latLng(lat, lng)],
            routeWhileDragging: false,
            showAlternatives: true,
            lineOptions: { styles: [{ color: getComputedStyle(document.body).getPropertyValue('--primary').trim(), weight: 5 }] },
            router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
            createMarker: () => null
        }).addTo(mapInstance);
    },
    centerOnUser() { if (state.location && mapInstance) mapInstance.setView([state.location.lat, state.location.lng], 16); },
    invalidateSize() { setTimeout(() => mapInstance?.invalidateSize(), 100); }
};

// ==================== LOCATION SERVICE ====================
function startLocationTracking() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => updateLocation(pos), err => console.log(err), { enableHighAccuracy: true });
    watchId = navigator.geolocation.watchPosition(updateLocation, err => console.log(err), { enableHighAccuracy: true, maximumAge: 5000 });
}

function updateLocation(pos) {
    state.location = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    document.getElementById('locationStatus').innerHTML = `<i class="fas fa-satellite-dish"></i> GPS: ${state.location.lat.toFixed(4)}, ${state.location.lng.toFixed(4)}`;
    if (!mapInstance) {
        MapService.init(state.location);
        MapService.addUserMarker(state.location.lat, state.location.lng);
        MapService.addVendorMarkers(state.vendors);
    } else {
        MapService.addUserMarker(state.location.lat, state.location.lng);
        MapService.centerOnUser();
    }
    checkGeofence();
}

function checkGeofence() {
    if (!state.settings.notifications.geofence || !state.location) return;
    state.vendors.forEach(v => {
        if (!v.latitude || !v.longitude) return;
        const dist = calcDistance(state.location.lat, state.location.lng, v.latitude, v.longitude);
        if (dist <= 0.1 && !geofenceAlerts.has(v.id)) {
            geofenceAlerts.add(v.id);
            showToast(`${v.business_name} is nearby! Only ${Math.round(dist * 1000)}m away.`);
            API.createActivity({ activity_type: 'geofence_alert', vendor_id: v.id });
        }
    });
}

function calcDistance(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

                <div style="max-width:380px;width:100%;background:var(--bg-surface);border-radius:32px;padding:32px 24px;border:1px solid var(--border-light)">
                    <h2 style="text-align:center;margin-bottom:24px">Create Account</h2>
                    <div class="input-group"><i class="fas fa-user"></i><input id="regName" placeholder="Full Name"></div>
                    <div class="input-group"><i class="fas fa-envelope"></i><input id="regEmail" placeholder="your@gmail.com"></div>
                    <div class="input-group"><i class="fas fa-phone"></i><input id="regPhone" placeholder="Phone Number"></div>
                    <div class="input-group"><i class="fas fa-lock"></i><input id="regPass" type="password" placeholder="Password"></div>
                    <div class="eula-notice">You must accept the EULA to create an account.</div>
                    <button id="viewEulaBtn" class="btn-outline" style="margin-bottom:16px"><i class="fas fa-file-alt"></i> View EULA</button>
                    <button id="doRegisterBtn" class="btn-primary" disabled>Sign Up</button>
                    <button id="backBtn" class="btn-outline" style="margin-top:12px">Back</button>
                </div>
            </div>
        </div>`;

    let eulaAccepted = false;
    const regBtn = document.getElementById('doRegisterBtn');
    
    document.getElementById('viewEulaBtn').onclick = async () => {
        await window.showEULAAcceptModal((accepted) => {
            eulaAccepted = accepted;
            regBtn.disabled = !accepted;
            if (accepted) showToast('EULA accepted! You can now register.');
        });
    };
    
    document.getElementById('doRegisterBtn').onclick = async () => {
        if (!eulaAccepted) { showToast('Please view and accept the EULA first'); return; }
        try {
            await API.register({
                full_name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPass').value
            });
            await API.login(document.getElementById('regEmail').value, document.getElementById('regPass').value);
            showMainApp();
        } catch(e) { showToast(e.message); }
    };
    document.getElementById('backBtn').onclick = showLanding;
}

async function showMainApp() {
    const savedUser = localStorage.getItem('lako_user');
    if (savedUser) state.user = JSON.parse(savedUser);
    if (!state.user) { showLanding(); return; }
    await API.getProjectInfo();
    await API.loadUserData();
    
    document.getElementById('app').innerHTML = `<div class="app-container">
        <div id="feedPane" class="tab-pane"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:1.3rem">Feed</h2><button id="createPostBtn" class="chip" style="background:var(--primary-gradient);color:white"><i class="fas fa-plus"></i> Share</button></div><div id="feedList"></div></div>
        <div id="mapPane" class="tab-pane hidden" style="padding:0"><div class="map-screen"><div class="map-search-bar"><i class="fas fa-search"></i><input id="mapSearch" placeholder="Search location..."><button id="searchLocationBtn">Go</button></div><div class="map-container"><div id="map"></div></div><div class="map-controls"><button id="centerMapBtn" class="map-btn"><i class="fas fa-location-dot"></i></button><button id="refreshMapBtn" class="map-btn"><i class="fas fa-sync-alt"></i></button></div><div id="locationStatus" class="location-status"><i class="fas fa-spinner fa-pulse"></i> Locating...</div></div></div>
        <div id="suggestPane" class="tab-pane hidden"><h2 style="font-size:1.3rem;margin-bottom:20px">Suggestions</h2><div id="suggestList"></div></div>
        <div id="searchPane" class="tab-pane hidden"><div class="search-bar" style="background:var(--bg-card);border-radius:60px;padding:12px 20px;display:flex;gap:12px;margin-bottom:20px"><i class="fas fa-search"></i><input id="globalSearch" placeholder="Search vendors..."><button id="doSearchBtn" style="background:var(--primary);border:none;padding:8px 20px;border-radius:40px;color:white">Search</button></div><div id="searchResults"></div></div>
        <div id="shortlistPane" class="tab-pane hidden"><h2 style="font-size:1.3rem;margin-bottom:20px">Saved Vendors</h2><div id="shortlistList"></div></div>
        <div id="activitiesPane" class="tab-pane hidden"><h2 style="font-size:1.3rem;margin-bottom:20px">Activity History</h2><div id="activitiesList"></div></div>
        <div id="profilePane" class="tab-pane hidden"><div id="profileContent"></div></div>
        <div class="bottom-nav"><button data-tab="feed" class="nav-item active"><i class="fas fa-newspaper"></i><span>Feed</span></button><button data-tab="map" class="nav-item"><i class="fas fa-map-marked-alt"></i><span>Map</span></button><button data-tab="suggest" class="nav-item"><i class="fas fa-lightbulb"></i><span>Suggest</span></button><button data-tab="search" class="nav-item"><i class="fas fa-search"></i><span>Search</span></button><button data-tab="shortlist" class="nav-item"><i class="fas fa-heart"></i><span>Saved</span></button><button data-tab="activities" class="nav-item"><i class="fas fa-history"></i><span>Activity</span></button><button data-tab="profile" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></button></div>
    </div>`;
    
    startLocationTracking();
    API.renderAll();
    
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById(btn.dataset.tab + 'Pane').classList.remove('hidden');
            if (btn.dataset.tab === 'map') MapService.invalidateSize();
            if (btn.dataset.tab === 'suggest') loadSuggestions();
            if (btn.dataset.tab === 'search') setupSearch();
        };
    });
    
    document.getElementById('createPostBtn').onclick = () => {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><div class="modal-header"><h3>Share Your Experience</h3><button class="modal-close">×</button></div><div style="padding:20px"><div class="input-group"><i class="fas fa-store"></i><select id="postVendor"><option value="">Select Vendor</option>${state.vendors.map(v => `<option value="${v.id}">${escapeHtml(v.business_name)}</option>`).join('')}</select></div><div class="input-group"><i class="fas fa-heading"></i><input id="postTitle" placeholder="Title"></div><div class="input-group"><i class="fas fa-star"></i><select id="postRating"><option value="">Rating</option><option value="5">★★★★★</option><option value="4">★★★★☆</option><option value="3">★★★☆☆</option><option value="2">★★☆☆☆</option><option value="1">★☆☆☆☆</option></select></div><div class="input-group"><i class="fas fa-comment"></i><textarea id="postContent" rows="4" placeholder="Share your review..."></textarea></div><button id="submitPostBtn" class="btn-primary">Post Review</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.modal-close').onclick = () => modal.remove();
        modal.querySelector('#submitPostBtn').onclick = async () => {
            await API.createPost({ vendor_id: document.getElementById('postVendor').value || null, title: document.getElementById('postTitle').value, rating: document.getElementById('postRating').value || null, content: document.getElementById('postContent').value });
            modal.remove();
        };
    };
    
    document.getElementById('centerMapBtn').onclick = () => MapService.centerOnUser();
    document.getElementById('refreshMapBtn').onclick = () => { MapService.init(state.location); MapService.addUserMarker(state.location.lat, state.location.lng); MapService.addVendorMarkers(state.vendors); };
    document.getElementById('searchLocationBtn').onclick = async () => {
        const q = document.getElementById('mapSearch').value;
        if (!q) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
            const data = await res.json();
            if (data[0]) mapInstance.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 15);
        } catch(e) { alert('Location not found'); }
    };
}

async function loadSuggestions() {
    const container = document.getElementById('suggestList');
    const recs = await API.getRecommendations();
    if (!recs.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-lightbulb"></i><p>Check back later for suggestions</p></div>'; return; }
    container.innerHTML = recs.map(v => `<div class="vendor-card" onclick="window.showVendorDetail(${v.id})"><div class="flex-row"><div class="vendor-icon"><i class="fas fa-store"></i></div><div style="flex:1"><div><strong>${escapeHtml(v.business_name)}</strong> <span class="badge-distance">★ ${v.rating||0}</span></div><div style="font-size:.75rem;color:var(--text-secondary)">${escapeHtml(v.category||'Street Food')}</div><div class="flex-row" style="margin-top:8px;gap:8px"><span class="chip" onclick="event.stopPropagation();window.navigateToVendor(${v.id})"><i class="fas fa-route"></i> Navigate</span><span class="chip" onclick="event.stopPropagation();window.chatWithVendor(${v.id})"><i class="fab fa-facebook-messenger"></i> Chat</span></div></div></div></div>`).join('');
}

function setupSearch() {
    document.getElementById('doSearchBtn').onclick = () => {
        const q = document.getElementById('globalSearch').value;
        if (!q) return;
        const results = state.vendors.filter(v => v.business_name?.toLowerCase().includes(q.toLowerCase()) || v.category?.toLowerCase().includes(q.toLowerCase()));
        const container = document.getElementById('searchResults');
        if (!results.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No vendors found</p></div>'; return; }
        container.innerHTML = results.map(v => `<div class="vendor-card" onclick="window.showVendorDetail(${v.id})"><div class="flex-row"><div class="vendor-icon"><i class="fas fa-store"></i></div><div style="flex:1"><div><strong>${escapeHtml(v.business_name)}</strong> <span class="badge-distance">★ ${v.rating||0}</span></div><div style="font-size:.75rem;color:var(--text-secondary)">${escapeHtml(v.address||'Location pending')}</div></div></div></div>`).join('');
    };
    document.getElementById('globalSearch').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('doSearchBtn').click(); });
}

const savedUser = localStorage.getItem('lako_user');
if (savedUser) { state.user = JSON.parse(savedUser); showMainApp(); } else { showSplash(); }
</script>
</body>
</html>

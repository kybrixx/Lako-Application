<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#28a745">
    <title>Lako · Street Food Discovery & Navigation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0f172a; transition: all 0.2s; }
        :root { --primary: #28a745; --primary-dark: #1e7e34; --primary-light: #48e0a0; --primary-gradient: linear-gradient(135deg, #28a745, #20c997); --primary-soft: rgba(40, 167, 69, 0.12); --bg-surface: #ffffff; --bg-page: #f8fafc; --text-muted: #475569; --border-light: #e2e8f0; --shadow-sm: 0 4px 12px rgba(0,0,0,0.05); --shadow-md: 0 8px 24px rgba(0,0,0,0.1); }
        [data-theme="blue"] { --primary: #0d6efd; --primary-gradient: linear-gradient(135deg, #0d6efd, #0dcaf0); --primary-soft: rgba(13,110,253,0.12); }
        [data-theme="purple"] { --primary: #6f42c1; --primary-gradient: linear-gradient(135deg, #6f42c1, #b77dff); --primary-soft: rgba(111,66,193,0.12); }
        [data-theme="orange"] { --primary: #fd7e14; --primary-gradient: linear-gradient(135deg, #fd7e14, #ffb347); --primary-soft: rgba(253,126,20,0.12); }
        [data-theme="teal"] { --primary: #20c997; --primary-gradient: linear-gradient(135deg, #20c997, #2ecc71); --primary-soft: rgba(32,201,151,0.12); }
        body { background: var(--bg-page); }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; background: var(--bg-page); z-index: 10; }
        .hidden { display: none !important; }
        #splash { background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; color: white; text-align: center; z-index: 200; }
        .splash-content i { font-size: 4rem; margin-bottom: 1rem; animation: bounce 0.9s ease infinite; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-10px); } }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 8px 0 14px; background: var(--bg-surface); border-top: 1px solid var(--border-light); z-index: 99; }
        .nav-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; color: var(--text-muted); cursor: pointer; padding: 6px 12px; border-radius: 40px; transition: 0.2s; }
        .nav-btn i { font-size: 1.3rem; }
        .nav-btn.active { color: var(--primary); font-weight: 500; background: var(--primary-soft); }
        .tab { padding: 20px 16px 80px 16px; min-height: 100vh; }
        .container { max-width: 560px; margin: 0 auto; }
        .card, .vendor-card, .feed-card { background: var(--bg-surface); border-radius: 28px; padding: 1rem; margin-bottom: 1rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); transition: all 0.2s; cursor: pointer; }
        .vendor-card { display: flex; gap: 14px; align-items: center; }
        .vendor-icon { width: 56px; height: 56px; background: var(--primary-gradient); border-radius: 32px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; flex-shrink: 0; }
        .vendor-info { flex: 1; }
        .btn-primary { background: var(--primary-gradient); border: none; padding: 12px 18px; border-radius: 40px; color: white; font-weight: 600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .btn-secondary { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 40px; padding: 12px 18px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-group { margin-bottom: 1rem; position: relative; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 14px 14px 14px 44px; border: 1px solid var(--border-light); border-radius: 48px; background: var(--bg-surface); font-size: 1rem; outline: none; transition: 0.2s; }
        .input-group textarea { padding: 14px; resize: vertical; min-height: 90px; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .map-container { height: 65vh; border-radius: 32px; overflow: hidden; box-shadow: var(--shadow-md); margin-bottom: 12px; }
        .map-controls { position: fixed; bottom: 100px; right: 16px; display: flex; flex-direction: column; gap: 12px; z-index: 500; }
        .control-btn { background: var(--bg-surface); border: none; width: 48px; height: 48px; border-radius: 32px; font-size: 1.2rem; box-shadow: var(--shadow-md); color: var(--primary); cursor: pointer; transition: 0.2s; }
        .theme-colors { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
        .theme-btn { width: 44px; height: 44px; border-radius: 44px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .theme-btn.active { border-color: white; box-shadow: 0 0 0 2px var(--primary); }
        .toggle-switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; border-radius: 34px; transition: 0.2s; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .toggle-slider { background-color: var(--primary); }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-surface); border-radius: 32px; max-width: 520px; width: 100%; max-height: 85vh; overflow: auto; }
        .modal-header { background: var(--primary-gradient); padding: 18px; color: white; border-radius: 32px 32px 0 0; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 18px; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .feed-card img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 20px; margin-top: 8px; background: #eef2ff; }
        .vote-section { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .vote-up, .vote-down { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 30px; transition: 0.2s; }
        .vote-up.voted { color: var(--primary); }
        .vote-down.voted { color: #ef4444; }
        .post-badge { background: var(--primary-soft); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; color: var(--primary); display: inline-block; }
        .post-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .post-actions { display: flex; gap: 20px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
        .post-actions button { background: none; border: none; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 30px; }
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        .menu-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-soft); padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; color: var(--primary); cursor: pointer; transition: 0.2s; }
        .vendor-menu-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
        .setting-item:last-child { border-bottom: none; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-surface); border-radius: 50px; padding: 5px 15px; align-items: center; border: 1px solid var(--border-light); }
        .search-bar input { flex: 1; padding: 12px 0; border: none; background: transparent; font-size: 16px; outline: none; }
        .search-bar button { background: none; border: none; color: var(--primary); font-size: 1.1rem; cursor: pointer; }
        .search-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); }
        .search-tab-btn { background: none; border: none; padding: 10px 16px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .search-tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .profile-stats { display: flex; justify-content: space-around; margin: 20px 0; padding: 20px; background: var(--bg-surface); border-radius: 20px; }
        .stat { text-align: center; }
        .stat i { font-size: 1.5rem; color: var(--primary); display: block; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .icon-btn { background: none; border: none; cursor: pointer; }
        .badge-distance { background: var(--primary-soft); border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; color: var(--primary); margin-left: 8px; }
        .toast-notification { position: fixed; bottom: 100px; left: 16px; right: 16px; background: var(--primary-gradient); color: white; padding: 16px; border-radius: 28px; z-index: 1000; box-shadow: var(--shadow-md); display: flex; justify-content: space-between; align-items: center; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 480px) { .container { padding: 15px; } .nav-btn span { font-size: 0.55rem; } }
    </style>
</head>
<body data-theme="green">
<div id="app"></div>

<script>
    // ======================== BACKEND API CONFIGURATION ========================
    const API_BASE = 'http://localhost:5000/api';
    
    // Global state
    let currentUser = null;
    let vendors = [];
    let posts = [];
    let shortlist = [];
    let userVotes = {};
    let currentLocation = null;
    let map = null;
    let userMarker = null;
    let watchId = null;
    let geofenceAlerts = [];
    let userPreferences = {
        theme: localStorage.getItem('theme') || 'green',
        radius: 2,
        categories: ['BBQ', 'Fishball', 'Isaw', 'Siomai', 'Turon', 'Kwek-Kwek', 'Burger', 'Fried Chicken'],
        selectedCategories: [],
        notifications: { nearbyVendors: true, newPosts: true, comments: true }
    };
    
    document.body.setAttribute('data-theme', userPreferences.theme);
    
    // Helper functions
    function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
    function formatDate(dateString) { if (!dateString) return ''; const date = new Date(dateString); return date.toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    function truncate(str, length) { if (!str) return ''; return str.length <= length ? str : str.substring(0, length) + '…'; }
    function calculateDistance(lat1, lon1, lat2, lon2) { const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2); const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); return R * c; }
    
    // API functions
    async function apiRequest(endpoint, options = {}) {
        try {
            const response = await fetch(`${API_BASE}${endpoint}`, { headers: { 'Content-Type': 'application/json' }, ...options });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
        } catch (error) { console.error('API Error:', error); throw error; }
    }
    
    async function login(email, password) {
        try {
            const data = await apiRequest('/login', { method: 'POST', body: JSON.stringify({ email, password }) });
            if (data.success) { currentUser = { id: data.id, full_name: data.full_name, email: data.email }; localStorage.setItem('userId', data.id); return true; }
            return false;
        } catch (error) { return false; }
    }
    
    async function register(fullName, email, phone, password) {
        try { await apiRequest('/register', { method: 'POST', body: JSON.stringify({ full_name: fullName, email, phone, password }) }); return true; } 
        catch (error) { return false; }
    }
    
    async function logout() { localStorage.removeItem('userId'); currentUser = null; if (watchId) navigator.geolocation.clearWatch(watchId); }
    
    async function loadUser(userId) {
        try { const user = await apiRequest(`/users/${userId}`); currentUser = user; return true; } 
        catch (error) { return false; }
    }
    
    async function fetchVendors() { try { vendors = await apiRequest('/vendors'); return vendors; } catch (error) { vendors = []; return []; } }
    async function fetchPosts() { 
        try { 
            const postsData = await apiRequest('/posts?sort=new'); 
            posts = postsData.map(post => ({
                ...post,
                vendor_name: post.vendor_name || 'Unknown Vendor',
                image_url: post.image || post.image_url
            }));
            return posts; 
        } catch (error) { 
            console.error('Error fetching posts:', error);
            posts = []; 
            return []; 
        } 
    }
    async function fetchShortlist() { if (!currentUser) return []; try { shortlist = await apiRequest(`/shortlist/user/${currentUser.id}`); return shortlist; } catch (error) { shortlist = []; return []; } }
    async function fetchUserVotes() { if (!currentUser) return {}; try { const votes = await apiRequest(`/votes/user/${currentUser.id}`); userVotes = {}; votes.forEach(v => { userVotes[v.post_id] = v.vote_type; }); return userVotes; } catch (error) { return {}; } }
    async function addToShortlist(vendorId) { try { await apiRequest('/shortlist', { method: 'POST', body: JSON.stringify({ user_id: currentUser.id, vendor_id: vendorId }) }); await fetchShortlist(); return true; } catch (error) { return false; } }
    async function removeFromShortlist(vendorId) { try { await apiRequest(`/shortlist/${vendorId}/user/${currentUser.id}`, { method: 'DELETE' }); await fetchShortlist(); return true; } catch (error) { return false; } }
    async function createPost(postData) { 
        try { 
            const post = await apiRequest('/posts', { 
                method: 'POST', 
                body: JSON.stringify({ ...postData, user_id: currentUser.id }) 
            });
            if (postData.vendor_id) {
                const vendor = vendors.find(v => v.id === postData.vendor_id);
                if (vendor) {
                    post.vendor_name = vendor.business_name;
                }
            }
            return post; 
        } catch (error) { 
            console.error('Error creating post:', error);
            throw error; 
        } 
    }
    async function addComment(postId, content) { try { return await apiRequest('/comments', { method: 'POST', body: JSON.stringify({ post_id: postId, user_id: currentUser.id, content }) }); } catch (error) { return false; } }
    async function vote(postId, voteType) { try { await apiRequest('/votes', { method: 'POST', body: JSON.stringify({ user_id: currentUser.id, post_id: postId, vote_type: voteType }) }); await fetchUserVotes(); await fetchPosts(); return true; } catch (error) { return false; } }
    async function logActivity(activityType, vendorId) { if (!userPreferences.notifications.nearbyVendors) return; try { await apiRequest('/activities', { method: 'POST', body: JSON.stringify({ user_id: currentUser.id, vendor_id: vendorId, activity_type: activityType }) }); } catch (e) {} }
    async function getMessengerLink(vendorId) { try { return await apiRequest(`/vendors/${vendorId}/messenger`); } catch (e) { return { messenger_url: 'https://m.me/lakoapp' }; } }
    
    // ======================== REAL-TIME LOCATION & GEOFENCING ========================
    function startLocationTracking() {
        if (!navigator.geolocation) {
            console.error('Geolocation not supported');
            alert('Location services not available on this device');
            return;
        }
        if (watchId) navigator.geolocation.clearWatch(watchId);
        
        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const newLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const accuracy = pos.coords.accuracy;
                currentLocation = newLoc;
                
                console.log(`Location updated: ${newLoc.lat.toFixed(4)}, ${newLoc.lng.toFixed(4)} (±${Math.round(accuracy)}m)`);
                
                if (map && userMarker) {
                    userMarker.setLatLng([newLoc.lat, newLoc.lng]);
                    if (accuracy < 100) map.setView([newLoc.lat, newLoc.lng], 16);
                } else if (map) {
                    userMarker = L.marker([newLoc.lat, newLoc.lng], { 
                        icon: L.divIcon({ 
                            html: '<i class="fas fa-user-circle" style="font-size: 28px; color: var(--primary);"></i>', 
                            iconSize: [28, 28],
                            className: 'user-location-marker'
                        }) 
                    }).addTo(map).bindPopup('📍 You are here');
                    map.setView([newLoc.lat, newLoc.lng], 15);
                }
                
                checkGeofence(newLoc);
                updateNearbyVendors(newLoc);
                renderNearbyList();
            },
            (err) => {
                console.error('Location error:', err.message);
                switch(err.code) {
                    case err.PERMISSION_DENIED:
                        console.log('Location permission denied. Please enable in settings.');
                        break;
                    case err.POSITION_UNAVAILABLE:
                        console.log('Location information unavailable.');
                        break;
                    case err.TIMEOUT:
                        console.log('Location request timeout.');
                        break;
                }
            },
            { 
                enableHighAccuracy: true, 
                maximumAge: 3000,
                timeout: 10000 
            }
        );
    }
    
    function checkGeofence(location) {
        if (!userPreferences.notifications.nearbyVendors) return;
        vendors.forEach(vendor => {
            if (vendor.latitude && vendor.longitude) {
                const dist = calculateDistance(location.lat, location.lng, vendor.latitude, vendor.longitude);
                if (dist <= 0.1 && !geofenceAlerts.includes(vendor.id)) {
                    geofenceAlerts.push(vendor.id);
                    if (Notification.permission === 'granted') {
                        new Notification(`🍜 ${vendor.business_name} is nearby!`, { body: `Only ${Math.round(dist * 1000)}m away! Tap to visit.` });
                    }
                    showGeofenceToast(vendor);
                } else if (dist > 0.15) {
                    geofenceAlerts = geofenceAlerts.filter(id => id !== vendor.id);
                }
            }
        });
    }
    
    function showGeofenceToast(vendor) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerHTML = `<div><i class="fas fa-location-dot"></i> <strong>${escapeHtml(vendor.business_name)}</strong><br><small>Less than 100m away!</small></div><button onclick="this.parentElement.remove(); showVendorDetail(${vendor.id})" style="background:white; border:none; padding:8px 16px; border-radius:40px; color:var(--primary); font-weight:bold; cursor:pointer;">View</button>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 8000);
    }
    
    function updateNearbyVendors(location) {
        const nearby = vendors.filter(v => v.latitude && v.longitude && calculateDistance(location.lat, location.lng, v.latitude, v.longitude) <= userPreferences.radius);
        const nearbyDiv = document.getElementById('nearbyVendorsList');
        if (nearbyDiv && nearby.length) {
            nearbyDiv.innerHTML = nearby.slice(0, 8).map(v => `<span class="menu-chip" onclick="showVendorDetail(${v.id})"><i class="fas fa-store"></i> ${escapeHtml(v.business_name)}</span>`).join('');
        }
    }
    
    function renderNearbyList() {
        const container = document.getElementById('nearbyFullList');
        if (!container || !currentLocation) return;
        let filtered = vendors.filter(v => v.latitude && v.longitude && calculateDistance(currentLocation.lat, currentLocation.lng, v.latitude, v.longitude) <= userPreferences.radius);
        if (userPreferences.selectedCategories.length) {
            filtered = filtered.filter(v => userPreferences.selectedCategories.includes(v.category));
        }
        filtered.sort((a, b) => {
            const distA = calculateDistance(currentLocation.lat, currentLocation.lng, a.latitude, a.longitude);
            const distB = calculateDistance(currentLocation.lat, currentLocation.lng, b.latitude, b.longitude);
            return distA - distB;
        });
        container.innerHTML = filtered.map(v => {
            const dist = calculateDistance(currentLocation.lat, currentLocation.lng, v.latitude, v.longitude);
            return `<div class="vendor-card" onclick="showVendorDetail(${v.id})">
                <div class="vendor-icon"><i class="fas fa-store"></i></div>
                <div class="vendor-info">
                    <h4>${escapeHtml(v.business_name)} <span class="badge-distance">${dist.toFixed(1)}km</span></h4>
                    <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(v.address || 'No address')}</p>
                    <p><i class="fas fa-star"></i> ${v.rating || 0} ⭐ (${v.review_count || 0} reviews)</p>
                    <div class="vendor-menu-row">
                        <span class="menu-chip" onclick="event.stopPropagation(); navigateToVendor(${v.id})"><i class="fas fa-directions"></i> Navigate</span>
                        <span class="menu-chip" onclick="event.stopPropagation(); messageVendor(${v.id})"><i class="fab fa-facebook-messenger"></i> Chat</span>
                        <span class="menu-chip" onclick="event.stopPropagation(); toggleShortlistQuick(${v.id})"><i class="fas fa-heart"></i> Save</span>
                    </div>
                </div>
            </div>`;
        }).join('');
        if (!filtered.length) container.innerHTML = '<div class="empty-state"><i class="fas fa-map-pin"></i><p>No vendors within your radius. Try increasing the radius in settings.</p></div>';
    }
    
    // ======================== UI RENDERING ========================
    function renderFeed() {
        const container = document.getElementById('feedList');
        if (!container) return;
        if (!posts.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-utensils"></i><p>No posts yet. Be the first to share your food experience!</p></div>'; return; }
        container.innerHTML = posts.map(post => {
            const score = (post.upvotes || 0) - (post.downvotes || 0);
            const isUpvoted = userVotes[post.id] === 1;
            const isDownvoted = userVotes[post.id] === -1;
            return `<div class="feed-card" onclick="showPostDetail(${post.id})">
                <div class="vote-section">
                    <button class="vote-up ${isUpvoted ? 'voted' : ''}" onclick="event.stopPropagation(); handleVote(${post.id}, 1)"><i class="fas fa-arrow-up"></i></button>
                    <span class="vote-score">${score}</span>
                    <button class="vote-down ${isDownvoted ? 'voted' : ''}" onclick="event.stopPropagation(); handleVote(${post.id}, -1)"><i class="fas fa-arrow-down"></i></button>

        // Add tile layer

        }).addTo(map);

            }).addTo(map).bindPopup(`Search radius: ${userPreferences.radius} km`);

        // Add vendor markers

                        </div>
                    </div>

                marker.addTo(map);
            }

        // Add user location marker
        if (currentLocation) {
            userMarker = L.marker([currentLocation.lat, currentLocation.lng], { 
                icon: L.divIcon({ 
                    html: '<i class="fas fa-user-circle" style="font-size: 32px; color: var(--primary); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));"></i>', 
                    iconSize: [32, 32],

        }
        
        // Update controls
        document.getElementById('centerLocationBtn')?.addEventListener('click', () => { 
            if (currentLocation && map) {
                map.setView([currentLocation.lat, currentLocation.lng], 16);

    window.navigateToVendor = (vendorId) => {
        const vendor = vendors.find(v => v.id === vendorId);
        if (!vendor || !vendor.latitude || !vendor.longitude) {
            alert('Vendor location not available');
            return;
        }
        
        let url;
        const mapsApp = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (currentLocation) {
            const origin = `${currentLocation.lat},${currentLocation.lng}`;
            const destination = `${vendor.latitude},${vendor.longitude}`;
            
            if (mapsApp) {
                // Try native maps on mobile
                if (/Android/i.test(navigator.userAgent)) {
                    url = `google.navigation:q=${destination}`;
                } else if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    url = `maps://maps.apple.com/?daddr=${destination}&dirflg=d`;
                }
                window.location.href = url;
            } else {
                // Web-based Google Maps
                url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=walking`;
                window.open(url, '_blank');
            }
        } else {
            // Just show the location
            url = `https://www.google.com/maps/search/?api=1&query=${vendor.latitude},${vendor.longitude}`;
            window.open(url, '_blank');
        }
        
        logActivity('navigate', vendorId);
    };

    function performSearch() {
        const query = document.getElementById('searchInput')?.value.trim();
        if (!query) return;
        const searchType = document.querySelector('.search-tab-btn.active')?.dataset.type || 'vendors';
        const resultsContainer = document.getElementById('searchResults');
        if (searchType === 'vendors') {
            const results = vendors.filter(v => v.business_name.toLowerCase().includes(query.toLowerCase()) || (v.category && v.category.toLowerCase().includes(query.toLowerCase())));
            resultsContainer.innerHTML = results.map(v => `<div class="vendor-card" onclick="showVendorDetail(${v.id})"><div class="vendor-icon"><i class="fas fa-store"></i></div><div class="vendor-info"><h4>${escapeHtml(v.business_name)}</h4><p>${escapeHtml(v.address || '')} ⭐ ${v.rating || 0}</p><div class="vendor-menu-row"><span class="menu-chip" onclick="event.stopPropagation(); navigateToVendor(${v.id})"><i class="fas fa-directions"></i> Navigate</span><span class="menu-chip" onclick="event.stopPropagation(); messageVendor(${v.id})"><i class="fab fa-facebook-messenger"></i> Chat</span></div></div></div>`).join('');
            if (!results.length) resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No vendors found</p></div>';
        } else {
            const results = posts.filter(p => p.title.toLowerCase().includes(query.toLowerCase()) || p.content.toLowerCase().includes(query.toLowerCase()));
            resultsContainer.innerHTML = results.map(p => `<div class="feed-card" onclick="showPostDetail(${p.id})"><h3>${escapeHtml(p.title)}</h3><div>${truncate(escapeHtml(p.content), 100)}</div><div class="post-meta">${formatDate(p.created_at)}</div></div>`).join('');
            if (!results.length) resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No posts found</p></div>';
        }
    }

                <button data-tab="profile" class="nav-btn"><i class="fas fa-user"></i><span>Profile</span></button>
            </div>
            <div id="feedTab" class="tab active"><div class="container"><div style="display:flex; justify-content:space-between; margin-bottom:16px"><h3><i class="fas fa-fire"></i> Foodie Feed</h3><button id="createPostBtn" style="background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:40px;font-weight:600;cursor:pointer"><i class="fas fa-plus"></i> Share</button></div><div id="feedList"></div></div></div>
            <div id="mapTab" class="tab hidden"><div id="map" class="map-container"></div><div class="map-controls"><button id="centerLocationBtn" class="control-btn"><i class="fas fa-location-dot"></i></button><button id="refreshMapBtn" class="control-btn"><i class="fas fa-sync-alt"></i></button></div></div>
            <div id="nearbyTab" class="tab hidden"><div class="container"><h3><i class="fas fa-map-pin"></i> Vendors Within ${userPreferences.radius}km</h3><div id="nearbyVendorsList" class="vendor-menu-row" style="margin:12px 0; flex-wrap:wrap"></div><div id="nearbyFullList"></div></div></div>
            <div id="searchTab" class="tab hidden"><div class="container"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search vendors or posts..."><button id="searchExec" class="icon-btn"><i class="fas fa-arrow-right"></i></button></div><div class="search-tabs"><button class="search-tab-btn active" data-type="vendors"><i class="fas fa-store"></i> Vendors</button><button class="search-tab-btn" data-type="posts"><i class="fas fa-newspaper"></i> Posts</button></div><div id="searchResults"></div></div></div>
            <div id="profileTab" class="tab hidden"><div class="container"><div class="card" style="text-align:center"><i class="fas fa-user-circle" style="font-size:4rem;color:var(--primary)"></i><h3>${escapeHtml(currentUser.full_name)}</h3><p>${escapeHtml(currentUser.email)}</p></div>
            <div class="card"><h4>🎨 Theme</h4><div class="theme-colors"><button class="theme-btn" data-theme="green" style="background:#28a745"></button><button class="theme-btn" data-theme="blue" style="background:#0d6efd"></button><button class="theme-btn" data-theme="purple" style="background:#6f42c1"></button><button class="theme-btn" data-theme="orange" style="background:#fd7e14"></button><button class="theme-btn" data-theme="teal" style="background:#20c997"></button></div></div>
            <div class="card"><h4><i class="fas fa-sliders-h"></i> Discovery Radius (km)</h4><input type="range" id="radiusSlider" min="0.5" max="2" step="0.1" value="${userPreferences.radius}" style="width:100%"><span id="radiusValue">${userPreferences.radius} km</span><p class="text-muted" style="font-size:0.7rem; margin-top:4px">Vendors within this radius appear in Nearby tab</p></div>
            <div class="card"><h4><i class="fas fa-utensils"></i> Food Categories</h4><div id="categoriesFilter" class="vendor-menu-row"></div></div>
            <div class="card"><h4><i class="fas fa-bell"></i> Notifications</h4><div class="setting-item"><span><i class="fas fa-location-dot"></i> Nearby vendor alerts (100m)</span><label class="toggle-switch"><input type="checkbox" id="nearbyNotif" ${userPreferences.notifications.nearbyVendors ? 'checked' : ''}><span class="toggle-slider"></span></label></div></div>
            <div class="card"><h4><i class="fas fa-map-o"></i> Location Services</h4><div class="setting-item"><span><i class="fas fa-crosshairs"></i> Real-time Location Tracking</span><label class="toggle-switch"><input type="checkbox" id="locationTrackingToggle" checked><span class="toggle-slider"></span></label></div><p class="text-muted" style="font-size:0.75rem; margin-top:8px"><i class="fas fa-info-circle"></i> Keep enabled for geofence alerts and nearby vendor discovery</p></div>
            <div class="card"><h4><i class="fas fa-info-circle"></i> About Lako</h4><p>Version 2.1 · Capstone Project · AITE · Tiaong, Quezon</p><p>Geofencing: Alerts when within 100m of a vendor</p><p>Real-time Navigation: Google Maps Integration</p><p>Developers: Kyle Morillo & Alexander Millicamp</p></div>
            <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div></div>`;
        document.getElementById('app').innerHTML = mainHtml;
        renderFeed(); renderShortlist(); initMap(); renderNearbyList();
        document.querySelectorAll('.nav-btn').forEach(btn => { 
            btn.onclick = () => { 
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
                btn.classList.add('active'); 
                document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden')); 
                document.getElementById(`${btn.dataset.tab}Tab`).classList.remove('hidden'); 
                if (btn.dataset.tab === 'map') {
                    setTimeout(() => map?.invalidateSize(), 100);
                }
                if (btn.dataset.tab === 'profile') {
                    renderShortlist(); 
                }
                if (btn.dataset.tab === 'nearby') {
                    renderNearbyList();
                }
                if (btn.dataset.tab === 'search') {
                    document.getElementById('searchInput')?.focus();
                }
            }; 
        });
        document.getElementById('createPostBtn').onclick = showCreatePostModal;
        document.getElementById('logoutBtn').onclick = async () => { await logout(); showLanding(); };
        document.getElementById('centerLocationBtn')?.addEventListener('click', () => { if (currentLocation && map) map.setView([currentLocation.lat, currentLocation.lng], 15); });
        document.getElementById('radiusSlider')?.addEventListener('input', (e) => { userPreferences.radius = parseFloat(e.target.value); document.getElementById('radiusValue').innerText = userPreferences.radius + ' km'; renderNearbyList(); });
        document.getElementById('nearbyNotif')?.addEventListener('change', (e) => { userPreferences.notifications.nearbyVendors = e.target.checked; if (e.target.checked && Notification.permission !== 'granted') Notification.requestPermission(); });
        document.getElementById('locationTrackingToggle')?.addEventListener('change', (e) => {
            if (e.target.checked) {
                startLocationTracking();
            } else {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                console.log('Location tracking disabled');
            }
        });
        const categoriesDiv = document.getElementById('categoriesFilter');
        if (categoriesDiv) {
            categoriesDiv.innerHTML = userPreferences.categories.map(cat => `<span class="menu-chip" data-cat="${cat}" style="${userPreferences.selectedCategories.includes(cat) ? 'background:var(--primary); color:white' : ''}" onclick="toggleCategory('${cat}')">${cat}</span>`).join('');
        }
        setupSearch(); setupTheme();
    }
    
    window.toggleCategory = (cat) => {
        if (userPreferences.selectedCategories.includes(cat)) userPreferences.selectedCategories = userPreferences.selectedCategories.filter(c => c !== cat);
        else userPreferences.selectedCategories.push(cat);
        const categoriesDiv = document.getElementById('categoriesFilter');
        if (categoriesDiv) categoriesDiv.innerHTML = userPreferences.categories.map(c => `<span class="menu-chip" data-cat="${c}" style="${userPreferences.selectedCategories.includes(c) ? 'background:var(--primary); color:white' : ''}" onclick="toggleCategory('${c}')">${c}</span>`).join('');
        renderNearbyList();
    };
    
    showSplash();
</script>
</body>
</html>
